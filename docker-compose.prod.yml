version: '3.8'
services:
  web:
    build: .
    image: camila-modas:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    depends_on: [] # in production, prefer managed DB; remove or add postgres if you include it

  # Optional postgres for small self-hosted deployments (recommended: use managed DB in prod)
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: camila_modas
      POSTGRES_USER: camila
      POSTGRES_PASSWORD: camila
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
